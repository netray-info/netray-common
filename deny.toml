[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
copyleft = "warn"
unlicensed = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[advisories]
version = 2
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
