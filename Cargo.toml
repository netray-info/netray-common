[package]
name = "netray-common"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Shared utilities for the netray.info service ecosystem"
repository = "https://github.com/lukaspustina/netray-common"
homepage = "https://netray.info"
keywords = ["networking", "security", "middleware", "axum"]
categories = ["web-programming::http-server"]
rust-version = "1.75"

[features]
default = []
cidr = ["dep:ip_network"]

[dependencies]
# HTTP framework (for HeaderMap, StatusCode, IntoResponse)
axum = { version = "0.8", features = ["json"] }

# Rate limiting
governor = "0.10"

# CIDR support (optional, for ifconfig-rs)
ip_network = { version = "0.4", optional = true }

# Metrics
metrics = "0.24"

# Serialization
serde = { version = "1", features = ["derive"] }

# Logging
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
serde_json = "1"
